<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Carrinho | Chefe Express 🍕</title>
  <link rel="stylesheet" href="css/carrinho.css">
</head>
<body>
  <header>
    <div class="container text-center my-4">
      <h1>🛒 Carrinho de Pedidos</h1>
      <a href="cardapio.html" class="btn btn-secondary mt-2">⬅ Voltar ao Cardápio</a>
    </div>
  </header>

  <main class="container">
    <div id="lista-pedidos"></div>

    <div class="campo-endereco my-4" style="max-width: 500px; margin: 20px auto;">
      <label for="endereco" style="display: block; font-weight: bold; margin-bottom: 5px;">Endereço de Entrega:</label>
      <input type="text" id="endereco" placeholder="Ex: Rua das Flores, 123 - Centro" 
             style="width: 100%; padding: 10px; border: 2px solid #ff8c00; border-radius: 8px;">
    </div>

    <div class="acoes text-center my-4">
      <button class="btn btn-danger" onclick="removerTodos()">Remover Todos</button>
      <button class="btn btn-success" onclick="finalizarPedido()">Finalizar Compra</button>
    </div>
  </main>

  <script src="js/carrinho.js"></script>
</body>
</html>
